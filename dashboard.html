<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Hub | Executive Portal</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        body { background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* Navbar Atas */
        .navbar { background: #000; padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .menu-icon { font-size: 24px; color: var(--gold); cursor: pointer; margin-right: 20px; }
        .brand { font-size: 1.2rem; letter-spacing: 3px; font-weight: bold; color: var(--gold); }

        /* Sidebar (Menu Samping) */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: #000; transition: 0.3s; z-index: 1000; border-right: 1px solid var(--gold); padding-top: 60px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 15px 30px; display: block; color: #fff; text-decoration: none; font-size: 0.9rem; border-bottom: 1px solid #111; transition: 0.2s; letter-spacing: 1px; }
        .sidebar-item:hover { background: var(--gold); color: #000; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 20px; color: var(--gold); cursor: pointer; }

        /* Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        .overlay.active { display: block; }

        /* Content */
        .content { padding: 30px 20px; text-align: center; }
        .user-welcome { border-left: 3px solid var(--gold); padding-left: 15px; text-align: left; max-width: 600px; margin: 0 auto 30px; }
        .user-welcome h2 { margin: 0; font-size: 1.4rem; }
        
        .main-card { background: #111; border: 1px solid #333; padding: 40px 20px; max-width: 600px; margin: 0 auto; border-radius: 8px; }
        .btn-go { display: inline-block; background: var(--gold); color: #000; text-decoration: none; padding: 15px 40px; font-weight: bold; margin-top: 20px; border-radius: 4px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div class="brand">AETHERIS</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="close-btn" onclick="toggleMenu()">✕</div>
        <div style="padding: 20px; text-align: center; border-bottom: 1px solid #222;">
            <div style="width: 60px; height: 60px; background: var(--gold); border-radius: 50%; margin: 0 auto 10px;"></div>
            <div style="font-size: 0.8rem; font-weight: bold;">CHANDRA CHRISTANTO</div>
        </div>
        <a href="dashboard.html" class="sidebar-item">🏠 Dashboard</a>
        <a href="shop.html" class="sidebar-item">🛍️ Belanja Sekarang</a>
        <a href="profil.html" class="sidebar-item">👤 Akun Saya</a>
        <a href="index.html" class="sidebar-item" style="color: #ff4d4d; margin-top: 50px;">🚪 Logout</a>
    </div>

    <div class="content">
        <div class="user-welcome">
            <h2>Executive Hub</h2>
            <p style="color: #888; font-size: 0.8rem;">Welcome back, Managing Director.</p>
        </div>

        <div class="main-card">
            <p style="font-size: 0.9rem; color: #ccc; line-height: 1.8;">Selamat datang di portal manajemen Aetheris Global. Akses seluruh layanan eksklusif melalui menu navigasi di sisi kiri layar Anda.</p>
            <a href="shop.html" class="btn-go">Mulai Belanja</a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>

</body>
</html>
