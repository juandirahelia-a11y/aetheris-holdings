<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris Core AI | Terminal</title>
    <style>
        body { background: #050505; color: #d4af37; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; font-size: 0.7rem; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .nav a { color: #d4af37; text-decoration: none; border: 1px solid #d4af37; padding: 5px 10px; }
        
        .ai-container { width: 100%; max-width: 600px; border: 1px solid #333; background: #000; margin-bottom: 30px; padding: 15px; }
        .ai-header { font-size: 0.8rem; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; color: #fff; }
        
        /* Chat Box Style */
        .chat-box { height: 150px; overflow-y: auto; font-size: 0.75rem; color: #00ff00; margin-bottom: 10px; padding: 5px; border: 1px solid #111; }
        .input-area { display: flex; gap: 5px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 8px; flex-grow: 1; font-family: 'Courier New'; font-size: 0.7rem; }
        button { background: #d4af37; border: none; padding: 5px 15px; color: #000; font-weight: bold; cursor: pointer; }
        
        .label-math { color: #d4af37; }
        .label-visual { color: #00dbff; }
        .label-ledger { color: #ff00ea; }
    </style>
</head>
<body>

    <div class="nav">
        <a href="dashboard.html">← EXIT</a>
        <span>CORE SYSTEM V.3.0.1</span>
    </div>

    <div class="ai-container">
        <div class="ai-header">● AETHER-MATH [QUANTUM COMPUTE]</div>
        <div class="chat-box" id="math-chat">
            > Aether-Math Online. Masukkan perhitungan Anda...
        </div>
        <div class="input-area">
            <input type="text" id="math-input" placeholder="Contoh: 1x1 atau 500+500">
            <button onclick="askMath()">ASK</button>
        </div>
    </div>

    <div class="ai-container">
        <div class="ai-header" style="color:#00dbff">● AETHER-VISUAL [DATA PROJECTION]</div>
        <div class="chat-box" id="visual-chat" style="color:#00dbff">
            > Aether-Visual Ready. Tanyakan tren pasar...
        </div>
        <div class="input-area">
            <input type="text" id="visual-input" placeholder="Tanya: tren btc atau proyeksi emas">
            <button style="background:#00dbff" onclick="askVisual()">RUN</button>
        </div>
    </div>

    <script>
        function askMath() {
            let input = document.getElementById('math-input').value;
            let box = document.getElementById('math-chat');
            if(input.includes('1x1')) {
                box.innerHTML += `<br>> USER: ${input}<br>> RESULT: 1.00000000 (Calculated via Quantum Core)`;
            } else {
                box.innerHTML += `<br>> USER: ${input}<br>> RESULT: Processing... [Error: Secure Auth Required for Full Data]`;
            }
            document.getElementById('math-input').value = "";
        }

        function askVisual() {
            let input = document.getElementById('visual-input').value.toLowerCase();
            let box = document.getElementById('visual-chat');
            if(input.includes('btc') || input.includes('bitcoin')) {
                box.innerHTML += `<br>> USER: ${input}<br>> PROJECTING: Bullish Trend Detected. target +15%`;
            } else {
                box.innerHTML += `<br>> USER: ${input}<br>> SYSTEM: Analyzing charts... Pattern found.`;
            }
            document.getElementById('visual-input').value = "";
        }
    </script>

    <div style="font-size:0.5rem; color:#333; margin-top:50px;">AETHERIS GLOBAL HOLDINGS // AI CORE SIMULATION</div>

</body>
</html>
