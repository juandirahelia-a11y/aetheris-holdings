<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether-Math AI | Advanced Intelligence</title>
    <style>
        body { background: #050505; color: #d4af37; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: #000; box-shadow: 0 2px 10px rgba(212, 175, 55, 0.1); }
        .header span { letter-spacing: 2px; font-weight: bold; font-size: 0.8rem; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 25px; scroll-behavior: smooth; display: flex; flex-direction: column; gap: 20px; }
        .input-box { padding: 20px; border-top: 1px solid #333; display: flex; gap: 10px; background: #000; }
        input { flex-grow: 1; background: #111; border: 1px solid #d4af37; color: #fff; padding: 15px; border-radius: 8px; font-family: 'Courier New'; outline: none; }
        button { background: #d4af37; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.3s; color: #000; }
        button:hover { background: #fff; box-shadow: 0 0 15px #d4af37; }
        
        /* Message Bubbles */
        .msg { max-width: 85%; padding: 15px; border-radius: 10px; line-height: 1.6; font-size: 0.85rem; position: relative; }
        .ai { align-self: flex-start; background: rgba(0, 255, 0, 0.03); border: 1px solid rgba(0, 255, 0, 0.2); color: #00ff00; }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid #444; color: #fff; }
        .ai::before { content: "AETHER-MATH:"; display: block; font-size: 0.6rem; font-weight: bold; margin-bottom: 8px; opacity: 0.7; }
        
        .math-result { border-top: 1px solid rgba(0,255,0,0.2); margin-top: 10px; padding-top: 10px; font-weight: bold; color: #fff; }
        strong { color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <span>● AETHER-MATH QUANTUM CORE</span>
        <a href="systems.html" style="color:#d4af37; text-decoration:none; font-size: 0.7rem; border: 1px solid #d4af37; padding: 4px 10px;">[EXIT TERMINAL]</a>
    </div>

    <div id="chat">
        <div class="msg ai">Sistem aktif. Saya adalah sub-unit AI Aetheris yang dikhususkan untuk analisis matematika. Masukkan persoalan angka atau logika matematika Anda.</div>
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="Tanya apa saja (contoh: 25 * 4 atau Berapa 100 dibagi 2?)" onkeypress="handleKey(event)">
        <button onclick="processAI()">SEND</button>
    </div>

    <script>
        function handleKey(e) { if(e.keyCode === 13) processAI(); }

        function processAI() {
            const inputField = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const rawInput = inputField.value.trim();
            
            if(!rawInput) return;

            // 1. Tampilkan Chat User
            chat.innerHTML += `<div class="msg user">${rawInput}</div>`;
            inputField.value = "";
            chat.scrollTop = chat.scrollHeight;

            // 2. Simulasi Loading
            const loadingId = "load-" + Date.now();
            chat.innerHTML += `<div class="msg ai" id="${loadingId}">Sedang menghitung via Quantum Core...</div>`;
            chat.scrollTop = chat.scrollHeight;

            setTimeout(() => {
                document.getElementById(loadingId).remove();
                
                // 3. LOGIKA PINTAR (MATH ENGINE)
                let cleanInput = rawInput.toLowerCase()
                    .replace('bagi', '/').replace(':', '/')
                    .replace('kali', '*').replace('x', '*')
                    .replace('tambah', '+').replace('kurang', '-');
                
                // Ekstrak angka dan operasi
                let mathExpression = cleanInput.match(/[0-9\+\-\*\/\.\(\)\s]+/g);
                let response = "";

                try {
                    if (mathExpression) {
                        let expression = mathExpression.join("");
                        let result = eval(expression);
                        
                        response = `<strong>ANALISIS PERHITUNGAN:</strong><br><br>
                        Input terdeteksi sebagai operasi aritmatika. Berdasarkan kalkulasi <em>Aetheris Engine</em>, berikut adalah rinciannya:<br><br>
                        • <strong>Ekspresi:</strong> ${expression}<br>
                        • <strong>Langkah:</strong> Memproses input melalui layer komputasi untuk memastikan akurasi desimal.<br>
                        • <strong>Hasil Akhir:</strong> <span style="font-size: 1.2rem; color: #fff;">${result}</span><br><br>
                        <strong>Penjelasan:</strong> Hasil ini diperoleh dengan mengikuti urutan operasi matematika standar (PEMDAS/BODMAS).`;
                    } else if (rawInput.toLowerCase().includes("halo") || rawInput.toLowerCase().includes("hi")) {
                        response = "Halo. Saya adalah modul AI matematika Aetheris. Ada perhitungan atau data statistik yang perlu saya bantu analisis?";
                    } else {
                        response = "Maaf, input tidak terdeteksi sebagai format matematika. Mohon gunakan angka dan simbol (+, -, *, /) agar saya dapat memberikan analisis yang detail.";
                    }
                } catch (e) {
                    response = "Kesalahan dalam memproses struktur matematika. Pastikan format angka yang Anda masukkan benar.";
                }

                // 4. Tampilkan Jawaban AI
                chat.innerHTML += `<div class="msg ai">${response}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 1200);
        }
    </script>
</body>
</html>
