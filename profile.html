<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saya | Aetheris Marketplace</title>
    <style>
        :root { --shopee-orange: #ee4d2d; --bg: #f5f5f5; }
        body { background: var(--bg); font-family: -apple-system, Helvetica, Arial, sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Header Profil */
        .header { background: linear-gradient(180deg, #f53d2d, #f63); padding: 30px 20px; color: #fff; position: relative; }
        .user-container { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); background: #eee; overflow: hidden; }
        .user-info b { font-size: 1.1rem; display: block; }
        .badge-classic { font-size: 0.7rem; background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 10px; border: 1px solid #fff; }

        /* Card Section */
        .section { background: #fff; margin-top: 10px; padding: 15px; }
        .section-header { display: flex; justify-content: space-between; font-size: 0.85rem; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        
        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; }
        .menu-item { font-size: 0.7rem; color: #333; text-decoration: none; }
        .menu-item span { font-size: 1.5rem; display: block; margin-bottom: 5px; }

        /* Login Sosmed */
        .login-box { padding: 20px; text-align: center; }
        .btn-social { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .google { background: #fff; color: #757575; border: 1px solid #ddd; }
        .fb { background: #1877f2; color: #fff; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-link { text-align: center; color: #555; text-decoration: none; font-size: 0.65rem; }
        .nav-link.active { color: var(--shopee-orange); }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-container">
            <div class="avatar"><img src="logo.jpg" style="width:100%; height:100%; object-fit:cover;"></div>
            <div class="user-info">
                <b>chandrachristantomait...</b>
                <span class="badge-classic">Classic ></span>
                <div style="font-size: 0.7rem; margin-top: 5px; opacity: 0.9;">77 Pengikut | 82 Mengikuti</div>
            </div>
        </div>
    </div>

    <div class="section login-box">
        <p style="font-size: 0.8rem; color: #888;">Login untuk akses fitur lengkap</p>
        <button class="btn-social google">Sign in with Google</button>
        <button class="btn-social fb">Login with Facebook</button>
    </div>

    <div class="section">
        <div class="section-header">
            <span>Pesanan Saya</span>
            <span style="color: #888;">Lihat Riwayat Pesanan ></span>
        </div>
        <div class="menu-grid">
            <a href="#" class="menu-item"><span>💳</span>Belum Bayar</a>
            <a href="#" class="menu-item"><span>📦</span>Dikemas</a>
            <a href="#" class="menu-item"><span>🚚</span>Dikirim</a>
            <a href="#" class="menu-item"><span>⭐</span>Beri Penilaian</a>
        </div>
    </div>

    <div class="section">
        <div class="section-header"><span>Dompet Saya</span></div>
        <div class="menu-grid">
            <a href="#" class="menu-item"><span>💰</span>AetherPay<br><small>Rp342</small></a>
            <a href="#" class="menu-item"><span>🪙</span>Koin Shopee<br><small>25rb</small></a>
            <a href="#" class="menu-item"><span>🎟️</span>Voucher Saya<br><small>50+</small></a>
            <a href="#" class="menu-item"><span>📱</span>SPayLater</a>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link">🏠<br>Beranda</a>
        <a href="#" class="nav-link">🏷️<br>Deals</a>
        <a href="#" class="nav-link">🔔<br>Notifikasi</a>
        <a href="profil.html" class="nav-link active">👤<br>Saya</a>
    </nav>

</body>
</html>
